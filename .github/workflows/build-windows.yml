name: build-windows-exe

on:
  push:
    branches: [main]
    paths:
      - 'windows/**'
      - 'linux/sprites.json'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

jobs:
  exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build FunnyPets.exe
        run: >
          pyinstaller --onefile --noconsole --name FunnyPets
          --add-data "linux/sprites.json;."
          windows/funnypets_win.py

      - uses: actions/upload-artifact@v4
        with:
          name: FunnyPets-windows
          path: dist/FunnyPets.exe
